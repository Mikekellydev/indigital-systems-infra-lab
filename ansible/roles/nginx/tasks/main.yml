---
- name: Install NGINX
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Deploy NGINX config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/default
    owner: root
    group: root
    mode: '0644'
  notify: Restart NGINX

- name: Ensure NGINX is running
  service:
    name: nginx
    state: started
    enabled: yes
